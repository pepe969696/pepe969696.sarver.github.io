<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時限式セルフリマインダー </title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- カスタムCSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg border-0 p-4 justify-content-center" style="max-width: 500px; width: 100%;">
            <div class="card-body">
                <h2 class="card-title text-center mb-2 fw-bold text-primary">未来の自分への手紙</h2>
                <p class="text-muted text-center small mb-4">指定した日時に、登録したメッセージが届きます。</p>
                
                <!-- 通知アラート -->
                <div id="alertMessage" class="alert d-none" role="alert"></div>

                <form id="reminderForm">
                    <!-- メールアドレス -->
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">メールアドレス</label>
                        <input type="email" class="form-control" id="email" placeholder="example@email.com" required>
                    </div>

                    <!-- お届け日時 -->
                    <div class="mb-3">
                        <label for="sendAt" class="form-label fw-semibold">日時（分単位まで）</label>
                        <input type="datetime-local" class="form-control" id="sendAt" required>
                    </div>

                    <!-- メッセージ内容 -->
                    <div class="mb-4">
                        <label for="content" class="form-label fw-semibold">メッセージ</label>
                        <textarea class="form-control" id="content" rows="5" placeholder="ここにテキストを挿入" required></textarea>
                    </div>

                    <!-- 送信ボタン -->
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">送信</button>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript処理 -->
    <script>
        document.getElementById('reminderForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const content = document.getElementById('content').value;
            
            // HTMLのdatetime-local形式 (YYYY-MM-DDTHH:MM) を データベース用 (YYYY-MM-DD HH:MM) に変換
            const rawSendAt = document.getElementById('sendAt').value;
            const send_at = rawSendAt.replace('T', ' ');

            const alertMessage = document.getElementById('alertMessage');

            try {
                const response = await fetch('/api/reminders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, content, send_at })
                });

                const data = await response.json();

                if (response.ok) {
                    alertMessage.className = "alert alert-success";
                    alertMessage.innerText = "メッセージを未来へ預かりました！";
                    document.getElementById('reminderForm').reset();
                } else {
                    alertMessage.className = "alert alert-danger";
                    alertMessage.innerText = data.error || "エラーが発生しました。";
                }
            } catch (error) {
                alertMessage.className = "alert alert-danger";
                alertMessage.innerText = "サーバーとの通信に失敗しました。";
            }
            
            alertMessage.classList.remove('d-none');
        });
    </script>
</body>
</html>
